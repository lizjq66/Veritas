<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" fill="none" role="img" aria-label="Veritas">
  <!-- Three concentric rings = three gates a proposal passes through -->
  <circle cx="48" cy="48" r="42" stroke="#0f172a" stroke-width="3"/>
  <circle cx="48" cy="48" r="28" stroke="#0f172a" stroke-width="3"/>
  <circle cx="48" cy="48" r="14" stroke="#0f172a" stroke-width="3"/>
  <!-- Center dot = certificate emitted at the core -->
  <circle cx="48" cy="48" r="3.5" fill="#0f172a"/>
</svg>
